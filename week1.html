<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Week 1 — Patterns & Systems</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Week 1: Patterns & Systems</h1>
<p>Minnesota Field Scientist</p>
</header>

<div class="container">

<div class="card">
<h2>Select a Mission</h2>
<button onclick="loadMission(1)">Mission 1 — Warming Northwoods Lake</button>
<button onclick="loadMission(2)">Mission 2 — Mississippi River Flooding</button>
<button onclick="loadMission(3)">Mission 3 — Prairie Food Web Shift</button>
</div>

<div id="missionArea"></div>

</div>

<script>

/* =============================
   WEEK 1 MISSION BANK
============================= */

const missionBank = {

1:{
title:"Mission 1: Warming Northwoods Lake",
scenario:`
<p>Over five summers, researchers studying a northern Minnesota lake recorded steadily rising July water temperatures. Local anglers have reported catching fewer walleye, a fish species that requires cool, oxygen-rich water. Scientists are investigating whether warming water may be affecting the lake ecosystem.</p>

<table>
<tr><th>Year</th><th>Average July Temperature (°C)</th></tr>
<tr><td>1</td><td>20</td></tr>
<tr><td>2</td><td>21</td></tr>
<tr><td>3</td><td>22</td></tr>
<tr><td>4</td><td>24</td></tr>
<tr><td>5</td><td>25</td></tr>
</table>
`,
questions:[
{
q:"Which statement best describes the pattern shown in the data table?",
options:[
"The temperature remained constant across all five years.",
"The temperature increased overall during the five-year period.",
"The temperature decreased sharply in the final year.",
"The temperature changed randomly without a clear trend."
],
correct:1,
explanation:"The data show a steady increase from 20°C to 25°C over five years."
},
{
q:"In this investigation, which variable is changing over time?",
options:[
"Year",
"Average water temperature",
"Type of fish present",
"Amount of rainfall"
],
correct:1,
explanation:"Average water temperature changes across years."
},
{
q:"Which explanation best connects rising water temperature to declining walleye populations?",
options:[
"Warmer water holds less dissolved oxygen, which walleye require to survive.",
"Warmer water causes lakes to freeze more quickly.",
"Higher temperatures prevent sunlight from reaching the lake surface.",
"Warmer water increases the density of oxygen in the lake."
],
correct:0,
explanation:"Warm water reduces dissolved oxygen levels needed by fish."
},
{
q:"Based on the data and observations, which conclusion is most reasonable?",
options:[
"The lake ecosystem appears stable and unchanged.",
"The lake ecosystem may be experiencing long-term change that could affect species balance.",
"The lake will immediately dry up.",
"The temperature increase guarantees all fish species will disappear."
],
correct:1,
explanation:"Sustained warming suggests system-level change."
}
]
},

2:{
title:"Mission 2: Mississippi River Flooding",
scenario:`
<p>In early April, rapid snowmelt combined with heavy rainfall caused the Mississippi River near St. Paul to rise quickly. Scientists measured river flow over four days and observed dramatic increases. Residents reported increased erosion along the riverbanks.</p>

<table>
<tr><th>Day</th><th>River Flow (CFS)</th></tr>
<tr><td>1</td><td>15000</td></tr>
<tr><td>2</td><td>22000</td></tr>
<tr><td>3</td><td>35000</td></tr>
<tr><td>4</td><td>40000</td></tr>
</table>
`,
questions:[
{
q:"Which statement best describes how the river flow changed over the four-day period?",
options:[
"The river flow decreased steadily each day.",
"The river flow increased overall each day.",
"The river flow remained constant.",
"The river flow changed randomly."
],
correct:1,
explanation:"The flow increased from 15,000 to 40,000 CFS."
},
{
q:"Which is the dependent variable in this investigation?",
options:[
"Day",
"River flow (CFS)",
"Snowfall amount",
"Air temperature"
],
correct:1,
explanation:"River flow changes in response to environmental conditions."
},
{
q:"Which explanation best describes why erosion increased?",
options:[
"Faster-moving water exerts greater force on soil particles.",
"Increased river flow removes gravity.",
"Higher water levels prevent soil from interacting with water.",
"Riverbanks become stronger when water levels rise."
],
correct:0,
explanation:"Greater water speed increases force on riverbanks."
},
{
q:"Based on the data, which conclusion is most reasonable?",
options:[
"The river system remained stable.",
"The river system experienced rapid change indicating instability.",
"The river permanently changed direction.",
"The river stopped responding to weather."
],
correct:1,
explanation:"Rapid increases in flow indicate instability."
}
]
},

3:{
title:"Mission 3: Prairie Food Web Shift",
scenario:`
<p>After an unusually mild winter in western Minnesota, ecologists observed a sharp increase in grasshopper populations across prairie sites. Researchers also recorded decreases in prairie grass coverage.</p>

<table>
<tr><th>Year</th><th>Grasshoppers per m²</th></tr>
<tr><td>1</td><td>12</td></tr>
<tr><td>2</td><td>14</td></tr>
<tr><td>3</td><td>13</td></tr>
<tr><td>4</td><td>25</td></tr>
</table>
`,
questions:[
{
q:"Which statement best describes the pattern in grasshopper population?",
options:[
"The population remained constant.",
"The population decreased steadily.",
"The population increased dramatically in Year 4.",
"The population changed randomly."
],
correct:2,
explanation:"The population nearly doubled in Year 4."
},
{
q:"Which explanation best connects the mild winter to the population increase?",
options:[
"Mild winters allow more grasshoppers to survive.",
"Mild winters eliminate predators permanently.",
"Mild winters reduce sunlight.",
"Mild winters freeze the soil."
],
correct:0,
explanation:"Higher survival rates increase spring population."
},
{
q:"If grasshopper populations continue to increase, which outcome is most likely?",
options:[
"Prairie grass populations increase.",
"Prairie grass populations decrease due to consumption.",
"All predators disappear instantly.",
"Sunlight levels decrease."
],
correct:1,
explanation:"More herbivores consume more grasses."
},
{
q:"Which best describes the prairie ecosystem response?",
options:[
"It remains perfectly stable.",
"It may experience short-term instability.",
"It permanently collapses.",
"It instantly returns to original balance."
],
correct:1,
explanation:"Rapid population changes can destabilize ecosystems."
}
]
}

};

/* =============================
   ENGINE
============================= */

function loadMission(id){
let m = missionBank[id];
let html = `<div class="card"><h2>${m.title}</h2>${m.scenario}`;

m.questions.forEach((q,i)=>{
html+=`<p><strong>Q${i+1}: ${q.q}</strong></p>`;
q.options.forEach((opt,index)=>{
html+=`<input type="radio" name="q${i}" value="${index}"> ${opt}<br>`;
});
});

html+=`<button onclick="submitMission(${id})">Submit Mission</button></div>`;
document.getElementById("missionArea").innerHTML = html;
}

function submitMission(id){
let m = missionBank[id];
let correctCount=0;
let reviewHTML="<div class='card'><h2>Mission Review</h2>";

m.questions.forEach((q,i)=>{
let selected=document.querySelector(`input[name="q${i}"]:checked`);
let answer=selected?parseInt(selected.value):-1;

if(answer===q.correct){correctCount++;}

reviewHTML+=`
<div class="reviewBox">
<strong>Q${i+1}</strong><br>
Correct Answer: ${q.options[q.correct]}<br>
🧠 ${q.explanation}
</div>`;
});

reviewHTML+=`Score: ${correctCount}/${m.questions.length}<br>
<button onclick="loadMission(${id})">Retake</button>
<button onclick="document.getElementById('missionArea').innerHTML=''">Back</button>
</div>`;

document.getElementById("missionArea").innerHTML = reviewHTML;
}

</script>

</body>
</html>
